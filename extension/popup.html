<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 520px;
      min-height: 200px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 12px;
      margin: 0;
      background: #1b2838;
      color: #c6d4df;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #2a475e;
    }
    th {
      background: #2a475e;
      color: #fff;
      font-size: 12px;
    }
    td a {
      color: #67c1f5;
      text-decoration: none;
    }
    td a:hover { text-decoration: underline; }
    .remove-btn {
      background: none;
      border: none;
      color: #c6382a;
      cursor: pointer;
      font-size: 15px;
      padding: 0 4px;
    }
    .remove-btn:hover { color: #ff4444; }
    #download-all {
      display: block;
      width: 100%;
      padding: 8px;
      background: #5c7e10;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 13px;
      cursor: pointer;
    }
    #download-all:hover { background: #6d961a; }
    #download-all:disabled {
      background: #555;
      cursor: default;
    }
    .empty {
      text-align: center;
      padding: 30px 0;
      color: #8f98a0;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #8f98a0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
    <h2 style="margin: 0;">Workshop Download Queue</h2>
    <a href="http://127.0.0.1:5000/settings" target="_blank" style="color: #67c1f5; text-decoration: none; font-size: 13px;" title="Open Server Settings">⚙ Settings</a>
  </div>
  <div id="content"></div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
